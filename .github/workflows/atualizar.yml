{"name": "Atualizar dashboard", "on": {"push": {"paths": ["dados/**"]}, "schedule": [{"cron": "0 6 * * *"}], "workflow_dispatch": {}}, "jobs": {"atualizar": {"runs-on": "ubuntu-latest", "permissions": {"contents": "write"}, "steps": [{"name": "Checkout", "uses": "actions/checkout@v4"}, {"name": "Configurar Python", "uses": "actions/setup-python@v5", "with": {"python-version": "3.11"}}, {"name": "Instalar dependencias", "run": "pip install cryptography"}, {"name": "Gerar dados criptografados", "env": {"DASHBOARD_SALT": "${{ secrets.DASHBOARD_SALT }}"}, "run": "python gerar_data.py"}, {"name": "Publicar chaves de acesso como artifact (nao commitado)", "uses": "actions/upload-artifact@v4", "with": {"name": "chaves_acesso", "path": "chaves_acesso.csv", "retention-days": 7}}, {"name": "Commit dos dados gerados em data/", "run": "git config user.name \"github-actions[bot]\"\ngit config user.email \"github-actions[bot]@users.noreply.github.com\"\ngit add data/\ngit diff --staged --quiet || git commit -m \"Atualizar dados criptografados [skip ci]\"\ngit push"}]}}}
